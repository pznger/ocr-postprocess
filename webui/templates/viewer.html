<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对照查看</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #fff; --border: #e0e0e0;
    --accent: #2563eb; --text: #1f2937; --muted: #6b7280;
    --radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); height:100vh; display:flex; flex-direction:column; }

  /* 顶栏 */
  .toolbar { display:flex; align-items:center; gap:12px; padding: 8px 16px; background: var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
  .toolbar h2 { font-size:1rem; margin-right:auto; }
  .toolbar select, .toolbar input { padding:4px 8px; border:1px solid var(--border); border-radius:4px; font-size:0.85rem; }
  .toolbar button { padding:5px 12px; border:none; border-radius:4px; background:var(--accent); color:#fff; cursor:pointer; font-size:0.85rem; }
  .toolbar button:hover { opacity:.85; }
  .toolbar .page-info { font-size:0.85rem; color:var(--muted); min-width:80px; text-align:center; }

  /* 主区域 */
  .main { display:flex; flex:1; overflow:hidden; }
  .pane { flex:1; overflow-y:auto; border-right:1px solid var(--border); position:relative; }
  .pane:last-child { border-right:none; }
  .pane-header { position:sticky; top:0; background:var(--card); padding:6px 12px; font-size:0.8rem; font-weight:600; color:var(--muted); border-bottom:1px solid var(--border); z-index:2; display:flex; align-items:center; gap:8px; }
  .pane-header .page-badge { background:var(--accent); color:#fff; padding:1px 8px; border-radius:10px; font-size:0.7rem; }

  /* PDF 区域 */
  .pdf-container { padding:12px; text-align:center; }
  .pdf-container img { max-width:100%; box-shadow:0 2px 8px rgba(0,0,0,.1); border-radius:2px; margin-bottom:8px; }
  .pdf-container .page-num { font-size:0.8rem; color:var(--muted); }

  /* MD 区域 */
  .md-container { padding: 16px 24px; font-size:0.9rem; line-height:1.7; }
  .md-container h1 { font-size:1.3rem; margin:1em 0 .5em; padding-bottom:4px; border-bottom:2px solid var(--accent); }
  .md-container h2 { font-size:1.1rem; margin:.8em 0 .4em; }
  .md-container p { margin:.4em 0; }
  .md-container strong { color:#000; }
  .md-container .page-marker { display:block; text-align:center; color:var(--muted); font-size:0.7rem; margin: 12px 0; padding: 4px 0; border-top:1px dashed var(--border); cursor:pointer; user-select:none; }
  .md-container .page-marker:hover { background:#f0f4ff; }
  .md-container .page-marker.active { background:#dbeafe; color:var(--accent); font-weight:600; }
  .md-container table { border-collapse:collapse; margin:8px 0; font-size:0.8rem; width:100%; }
  .md-container td, .md-container th { border:1px solid var(--border); padding:4px 8px; }
  .md-container code { background:#f3f4f6; padding:1px 4px; border-radius:2px; font-size:0.85em; }

  /* 同步高亮 */
  .sync-highlight { background: #fef3c7 !important; transition: background .3s; }

  /* 响应式 */
  @media (max-width:768px) {
    .main { flex-direction:column; }
    .pane { flex:none; height:50vh; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h2>📖 对照查看</h2>
  <select id="stageSelect" onchange="loadMd()">
    <option value="stripped">01-剥离前置</option>
    <option value="normalized">02-文本归一化</option>
    <option value="headings">03-标题折叠</option>
    <option value="final" selected>04-最终结果</option>
  </select>
  <button onclick="goPage(-1)" title="上一页">◀</button>
  <input type="number" id="pageInput" value="1" min="1" style="width:56px;text-align:center" onchange="jumpToPage()" onkeydown="if(event.key==='Enter')jumpToPage()">
  <span class="page-info" id="pageInfo">/ -</span>
  <button onclick="goPage(1)" title="下一页">▶</button>
  <button onclick="syncScroll()" style="background:#059669">📍 同步</button>
  <span style="font-size:0.8rem;color:var(--muted)" id="syncStatus"></span>
</div>

<div class="main">
  <!-- PDF 面板 -->
  <div class="pane" id="pdfPane">
    <div class="pane-header">📕 PDF 原稿 <span class="page-badge" id="pdfPageBadge">第 1 页</span></div>
    <div class="pdf-container" id="pdfContent">
      <p style="color:var(--muted);padding:40px;text-align:center">未上传 PDF 或正在加载...</p>
    </div>
  </div>

  <!-- MD 面板 -->
  <div class="pane" id="mdPane">
    <div class="pane-header">📝 Markdown <span class="page-badge" id="mdPageBadge">-</span></div>
    <div class="md-container" id="mdContent">
      <p style="color:var(--muted);padding:40px;text-align:center">加载中...</p>
    </div>
  </div>
</div>

<script>
  const JOB_ID = window.location.pathname.split('/').pop();
  let currentPage = 1;
  let totalPages = 0;
  let pageMarkers = [];   // [{page, line}, ...]
  let hasPdf = false;
  let mdLines = [];

  // 初始化
  (async function init() {
    const r = await fetch(`/api/job-info/${JOB_ID}`);
    const info = await r.json();
    hasPdf = info.has_pdf;
    totalPages = info.pages || 0;
    document.getElementById('pageInfo').textContent = `/ ${totalPages || '?'}`;
    if (!hasPdf) {
      document.getElementById('pdfContent').innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">未上传 PDF</p>';
    } else {
      loadPdfPage(1);
    }
    await loadMd();
  })();

  // ── PDF ───────────────────────────────────────────────
  function loadPdfPage(p) {
    if (!hasPdf) return;
    currentPage = Math.max(1, Math.min(p, totalPages || 999));
    document.getElementById('pageInput').value = currentPage;
    document.getElementById('pdfPageBadge').textContent = `第 ${currentPage} 页`;
    const img = document.createElement('img');
    img.src = `/api/pdf-page/${JOB_ID}/${currentPage}`;
    img.alt = `Page ${currentPage}`;
    img.onerror = () => { img.alt = '加载失败'; };
    const container = document.getElementById('pdfContent');
    container.innerHTML = '';
    container.appendChild(img);
    container.appendChild(Object.assign(document.createElement('div'), {
      className: 'page-num', textContent: `第 ${currentPage} 页`
    }));
  }

  function goPage(delta) {
    loadPdfPage(currentPage + delta);
    highlightMdPage(currentPage);
  }

  function jumpToPage() {
    const v = parseInt(document.getElementById('pageInput').value);
    if (v > 0) { loadPdfPage(v); highlightMdPage(v); }
  }

  // ── MD ────────────────────────────────────────────────
  async function loadMd() {
    const stage = document.getElementById('stageSelect').value;
    const r = await fetch(`/api/md-content/${JOB_ID}?stage=${stage}`);
    const text = await r.text();
    mdLines = text.split('\n');

    // 解析页码标记
    const mr = await fetch(`/api/page-markers/${JOB_ID}?stage=${stage}`);
    pageMarkers = await mr.json();

    renderMd(text);
    if (currentPage > 0) highlightMdPage(currentPage);
  }

  function renderMd(text) {
    const container = document.getElementById('mdContent');
    let html = '';
    const lines = text.split('\n');
    let inTable = false, inCode = false;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      // 页码标记
      const pm = line.trim().match(/^<!--\s*(\d+)\s*-->$/);
      if (pm) {
        html += `<span class="page-marker" data-page="${pm[1]}" data-line="${i}" onclick="onPageMarkerClick(${pm[1]})">— 第 ${pm[1]} 页 —</span>\n`;
        continue;
      }
      // 标题
      if (/^#\s/.test(line)) {
        html += `<h1 data-line="${i}">${escapeHtml(line.replace(/^#\s/, ''))}</h1>\n`;
        continue;
      }
      if (/^##\s/.test(line)) {
        html += `<h2 data-line="${i}">${escapeHtml(line.replace(/^##\s/, ''))}</h2>\n`;
        continue;
      }
      // 表格
      if (/^<table/.test(line)) { inTable = true; }
      if (inTable) { html += line + '\n'; if (/<\/table>/.test(line)) inTable = false; continue; }
      // 公式
      if (/^\$\$/.test(line)) {
        html += `<div style="background:#f9fafb;padding:8px;margin:8px 0;border-left:3px solid var(--accent);font-family:monospace;font-size:0.85em">${escapeHtml(line)}</div>\n`;
        continue;
      }
      // 空行
      if (!line.trim()) { html += '\n'; continue; }
      // 条款编号（加粗）
      let rendered = escapeHtml(line);
      rendered = rendered.replace(/\*\*(\d+\.\d+\.\d+)\*\*/g, '<strong>$1</strong>');
      html += `<p data-line="${i}">${rendered}</p>\n`;
    }
    container.innerHTML = html;

    // 更新 md 页码标记激活态
    updateActiveMarker();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 同步 ──────────────────────────────────────────────
  function onPageMarkerClick(page) {
    loadPdfPage(page);
    highlightMdPage(page);
  }

  function highlightMdPage(page) {
    // 取消所有高亮
    document.querySelectorAll('.page-marker.active').forEach(el => el.classList.remove('active'));
    // 高亮对应页码标记
    const marker = document.querySelector(`.page-marker[data-page="${page}"]`);
    if (marker) {
      marker.classList.add('active');
      marker.scrollIntoView({ behavior:'smooth', block:'center' });
    }
    document.getElementById('mdPageBadge').textContent = `第 ${page} 页`;
    document.getElementById('syncStatus').textContent = '';
  }

  function syncScroll() {
    // 找到 MD 滚动位置最近的页码标记，同步 PDF
    const mdPane = document.getElementById('mdPane');
    const scrollTop = mdPane.scrollTop + mdPane.clientHeight / 2;
    const markers = document.querySelectorAll('.page-marker');
    let bestPage = 1, bestDist = Infinity;
    markers.forEach(m => {
      const dist = Math.abs(m.offsetTop - scrollTop);
      if (dist < bestDist) { bestDist = dist; bestPage = parseInt(m.dataset.page); }
    });
    if (bestPage !== currentPage) {
      loadPdfPage(bestPage);
      highlightMdPage(bestPage);
      document.getElementById('syncStatus').textContent = '已同步';
    }
  }

  function updateActiveMarker() {
    document.querySelectorAll('.page-marker.active').forEach(el => el.classList.remove('active'));
    const marker = document.querySelector(`.page-marker[data-page="${currentPage}"]`);
    if (marker) marker.classList.add('active');
  }

  // MD 区域滚动时更新激活页码标记
  document.addEventListener('DOMContentLoaded', () => {
    const mdPane = document.getElementById('mdPane');
    if (mdPane) {
      mdPane.addEventListener('scroll', () => {
        const scrollTop = mdPane.scrollTop + 100;
        let bestPage = currentPage, bestDist = Infinity;
        document.querySelectorAll('.page-marker').forEach(m => {
          const dist = Math.abs(m.offsetTop - scrollTop);
          if (dist < bestDist && dist < 200) { bestDist = dist; bestPage = parseInt(m.dataset.page); }
        });
        if (bestPage !== currentPage) {
          document.querySelectorAll('.page-marker.active').forEach(el => el.classList.remove('active'));
          const marker = document.querySelector(`.page-marker[data-page="${bestPage}"]`);
          if (marker) marker.classList.add('active');
          document.getElementById('mdPageBadge').textContent = `第 ${bestPage} 页`;
        }
      });
    }
  });
</script>
</body>
</html>
